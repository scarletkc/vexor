name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9][a-z0-9._/-]*\))?!?: .+'
          if printf '%s' "$PR_TITLE" | grep -qE "$pattern"; then
            echo "PR title follows Conventional Commits: $PR_TITLE"
          else
            echo "::error::PR title must follow Conventional Commits: 'type(scope): description'"
            echo "Allowed types: feat fix docs style refactor perf test build ci chore revert"
            echo "Examples:"
            echo "  feat(mcp): add stdio server for AI agents"
            echo "  fix(cache): handle locked index database"
            echo "  docs: update roadmap"
            echo "Squash merges use the PR title as the commit subject, so this keeps main history clean."
            exit 1
          fi
