name: Test & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: Pytest (ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect doc-only changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"
            BASE_REF="${BASE_SHA}"
          else
            if [ "$(git rev-list --count HEAD)" -le 1 ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            BASE_REF="HEAD^"
          fi

          changed_files="$(git diff --name-only "${BASE_REF}" HEAD)"
          if [ -z "${changed_files}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          doc_only=true
          while IFS= read -r file; do
            if [[ "$file" == *.py ]]; then
              doc_only=false
              break
            fi
          done <<< "${changed_files}"

          if [ "${doc_only}" = true ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Docs-only changes (skip)
        if: steps.detect.outputs.changed != 'true'
        shell: bash
        run: |
          echo "Only documentation files changed; skipping tests."

      - name: Setup Python
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage
        if: steps.detect.outputs.changed == 'true'
        shell: bash
        run: |
          python -m pytest -q --cov=vexor --cov-report=xml

      # CODECOV_TOKEN is configured in repository secrets
      - name: Upload coverage to Codecov
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          verbose: false

  prepare_release:
    name: Prepare release metadata
    needs: pytest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_changed: ${{ steps.versions.outputs.release_changed }}
      version: ${{ steps.versions.outputs.version }}
      prev_tag: ${{ steps.versions.outputs.prev_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version changes
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          def read_version_from_text(text: str) -> str:
              match = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
              if not match:
                  raise SystemExit("Unable to find __version__ in vexor/__init__.py")
              return match.group(1)

          def read_file_from_ref(ref: str, path: str):
              try:
                  return subprocess.check_output(
                      ["git", "show", f"{ref}:{path}"],
                      text=True,
                  )
              except subprocess.CalledProcessError:
                  return None

          current_init = pathlib.Path("vexor/__init__.py").read_text(encoding="utf-8")
          current_version = read_version_from_text(current_init)

          prev_init = read_file_from_ref("HEAD^", "vexor/__init__.py")
          if prev_init is None:
              release_changed = True
              prev_version = ""
          else:
              prev_version = read_version_from_text(prev_init)
              release_changed = current_version != prev_version

          current_tag = f"v{current_version}"
          prev_tag = ""
          try:
              prev_tag = subprocess.check_output(
                  ["git", "describe", "--tags", "--abbrev=0", "--match", "v*", "HEAD"],
                  text=True,
              ).strip()
          except subprocess.CalledProcessError:
              prev_tag = ""
          if prev_tag == current_tag:
              try:
                  prev_tag = subprocess.check_output(
                      ["git", "describe", "--tags", "--abbrev=0", "--match", "v*", "HEAD^"],
                      text=True,
                  ).strip()
              except subprocess.CalledProcessError:
                  prev_tag = ""
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"release_changed={'true' if release_changed else 'false'}\n")
              handle.write(f"version={current_version}\n")
              handle.write(f"prev_tag={prev_tag}\n")
          PY

  build_release:
    name: Build executables (${{ matrix.os }})
    needs: prepare_release
    if: needs.prepare_release.outputs.release_changed == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: '3.10'
            artifact-suffix: windows.exe
            built-binary: dist/vexor.exe
          - os: ubuntu-latest
            python-version: '3.10'
            artifact-suffix: linux
            built-binary: dist/vexor
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf dist build

      - name: Build executable
        shell: bash
        run: |
          pyinstaller vexor.spec

      - name: Prepare CLI release asset
        shell: bash
        run: |
          VERSION="${{ needs.prepare_release.outputs.version }}"
          mkdir -p release
          cp "${{ matrix.built-binary }}" "release/vexor-${VERSION}-${{ matrix.artifact-suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vexor-${{ matrix.artifact-suffix }}
          path: release/
          if-no-files-found: error

  publish_release:
    name: Publish GitHub release
    needs:
      - prepare_release
      - build_release
    if: needs.prepare_release.outputs.release_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          PREV_TAG: ${{ needs.prepare_release.outputs.prev_tag }}
        run: |
          set -euo pipefail

          CURRENT_TAG="v${VERSION}"

          {
            echo "Automated release for Vexor ${CURRENT_TAG}."
            echo
            echo "## Changelog"
            echo
            if [ -n "${PREV_TAG}" ]; then
              echo "Changes since ${PREV_TAG}:"
              echo
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --reverse
              echo
              echo
              echo "[Full diff](https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${CURRENT_TAG})"
            else
              git log HEAD --pretty=format:'- %s (%h)' --reverse
            fi
          } > release_notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare_release.outputs.version }}
          name: Vexor v${{ needs.prepare_release.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare_release.outputs.version, 'a') || contains(needs.prepare_release.outputs.version, 'b') || contains(needs.prepare_release.outputs.version, 'rc') }}
          files: release/*
          body_path: release_notes.md

  publish_mcp_registry:
    name: Publish to MCP registry
    needs:
      - prepare_release
      - publish_pypi
    if: >-
      needs.prepare_release.outputs.release_changed == 'true' &&
      !contains(needs.prepare_release.outputs.version, 'a') &&
      !contains(needs.prepare_release.outputs.version, 'b') &&
      !contains(needs.prepare_release.outputs.version, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync server.json version
        shell: bash
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib

          version = os.environ["VERSION"]
          path = pathlib.Path("server.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["version"] = version
          for package in data.get("packages", []):
              package["version"] = version
          path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          print(f"server.json synced to {version}")
          PY

      - name: Wait for PyPI to serve the release
        shell: bash
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -fsS "https://pypi.org/pypi/vexor/${VERSION}/json" > /dev/null; then
              echo "PyPI serves vexor ${VERSION}."
              exit 0
            fi
            echo "Waiting for PyPI (${attempt}/30)..."
            sleep 10
          done
          echo "PyPI did not serve vexor ${VERSION} in time." >&2
          exit 1

      - name: Install mcp-publisher
        shell: bash
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          archive="mcp-publisher_linux_amd64.tar.gz"
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${archive}" \
            -o "${archive}"
          echo "${MCP_PUBLISHER_SHA256}  ${archive}" | sha256sum --check --strict
          tar xzf "${archive}" mcp-publisher

      - name: Publish to MCP registry
        shell: bash
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  publish_pypi:
    name: Publish to PyPI
    needs: prepare_release
    if: needs.prepare_release.outputs.release_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling twine

      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf dist build

      - name: Build distribution
        shell: bash
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
